services:
  tradingagents:
    build:
      context: .
      dockerfile: Dockerfile_web
    restart: always
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - PYTHONUNBUFFERED=1
      - TRADINGAGENTS_RESULTS_DIR=/app/results
    volumes:
      - tradingagents-results:/app/results
    networks:
      - tradehub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradingagents.rule=Host(`agents.thesolution.at`)"
      - "traefik.http.routers.tradingagents.entrypoints=websecure"
      - "traefik.http.routers.tradingagents.tls=true"
      - "traefik.http.routers.tradingagents.middlewares=agents-auth"
      - "traefik.http.middlewares.agents-auth.basicauth.users=owner:$apr1$y.Usukd9$mCpYYvB1OBHCfULMnn0/f."
      - "traefik.http.services.tradingagents.loadbalancer.server.port=8000"

volumes:
  tradingagents-results:

networks:
  tradehub-network:
    external: true
