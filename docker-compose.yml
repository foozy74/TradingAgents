services:
  tradingagents:
    build:
      context: .
      dockerfile: Dockerfile_web
    restart: always
    ports:
      - "8002:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - PYTHONUNBUFFERED=1
      - TRADINGAGENTS_RESULTS_DIR=/app/results
    volumes:
      - tradingagents-results:/app/results
    networks:
      - tradehub-network

volumes:
  tradingagents-results:

networks:
  tradehub-network:
    external: true
    name: tradehub-shared
