services:
  tradingagents:
    build:
      context: .
      dockerfile: Dockerfile_web
    restart: always
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - PYTHONUNBUFFERED=1
      - TRADINGAGENTS_RESULTS_DIR=/app/results
    volumes:
      - tradingagents-results:/app/results
    networks:
      - tradehub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradingagents-router.rule=Host(`agents.thesolution.at`)"
      - "traefik.http.routers.tradingagents-router.tls=true"
      - "traefik.http.routers.tradingagents-router.middlewares=agents-trading-auth"
      - "traefik.http.middlewares.agents-trading-auth.basicauth.users=owner:$$apr1$$m3CeOzZ3$$I3WXxNUs8lJ.hx5foBv3C0"
      - "traefik.http.services.tradingagents-router.loadbalancer.server.port=8000"

volumes:
  tradingagents-results:

networks:
  tradehub-network:
    external: true
